<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布宠物 - 濮阳宠物交易</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <h1>🐾 濮阳同城宠物市场</h1>
    <div class="nav">
      <a href="/">首页</a>
      <a href="/publish">发布宠物</a>
      <a href="/login">登录/注册</a>
      <a href="/mine">个人中心</a>
    </div>
  </div>
</header>

<div class="container main form-wrap">
  <h2>发布濮阳本地宠物信息</h2>
  <form id="publishForm" enctype="multipart/form-data">
    <div class="form-item">
      <label>标题</label>
      <input type="text" name="title" placeholder="例：英短蓝猫幼崽出售" required>
    </div>
    <div class="form-item">
      <label>宠物类型</label>
      <select name="type" required>
        <option value="猫咪">猫咪</option>
        <option value="狗狗">狗狗</option>
        <option value="小宠">仓鼠/兔子/鸟</option>
        <option value="配种">宠物配种</option>
        <option value="领养">免费领养</option>
      </select>
    </div>
    <div class="form-item">
      <label>濮阳区域</label>
      <select name="area" required>
        <option value="华龙区">华龙区</option>
        <option value="濮阳县">濮阳县</option>
        <option value="清丰县">清丰县</option>
        <option value="南乐县">南乐县</option>
        <option value="范县">范县</option>
        <option value="台前县">台前县</option>
      </select>
    </div>
    <div class="form-item">
      <label>价格（免费领养填0）</label>
      <input type="number" name="price" value="0" required>
    </div>
    <div class="form-item">
      <label>联系方式（微信/电话）</label>
      <input type="text" name="contact" placeholder="本地自提，联系我" required>
    </div>
    <div class="form-item">
      <label>宠物详情描述</label>
      <textarea name="desc" rows="4" placeholder="年龄、疫苗、性格、是否自提等"></textarea>
    </div>
    <div class="form-item">
      <label>上传宠物图片</label>
      <input type="file" name="img" accept="image/*">
    </div>
    <div class="form-item">
      <button type="submit" class="submit-btn">提交发布</button>
    </div>
  </form>
</div>

<script>
document.getElementById('publishForm').onsubmit = async (e)=>{
  e.preventDefault();
  const formData = new FormData(e.target);
  // 简单模拟用户uid，正式可对接登录用户
  formData.append('uid', 10001);
  const res = await fetch('/api/publish', {
    method: 'POST',
    body: formData
  })
  const data = await res.json();
  if(data.code===0){
    alert('发布成功！');
    location.href = '/';
  }else{
    alert(data.msg);
  }
}
</script>
</body>
</html>
