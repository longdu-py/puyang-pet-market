<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录注册 - 濮阳宠物交易</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <h1>🐾 濮阳同城宠物市场</h1>
    <div class="nav">
      <a href="/">首页</a>
      <a href="/publish">发布宠物</a>
      <a href="/login">登录/注册</a>
      <a href="/mine">个人中心</a>
    </div>
  </div>
</header>

<div class="container main form-wrap">
  <div class="tab-box">
    <button id="loginTab" class="active">登录</button>
    <button id="regTab">注册</button>
  </div>

  <!-- 登录 -->
  <form id="loginForm">
    <div class="form-item">
      <label>手机号</label>
      <input name="phone" type="tel" required>
    </div>
    <div class="form-item">
      <label>密码</label>
      <input name="pwd" type="password" required>
    </div>
    <button class="submit-btn">登录濮阳账号</button>
  </form>

  <!-- 注册 -->
  <form id="regForm" style="display:none;">
    <div class="form-item">
      <label>昵称</label>
      <input name="name" required>
    </div>
    <div class="form-item">
      <label>手机号</label>
      <input name="phone" type="tel" required>
    </div>
    <div class="form-item">
      <label>设置密码</label>
      <input name="pwd" type="password" required>
    </div>
    <button class="submit-btn">注册本地账号</button>
  </form>
</div>

<script>
// 切换登录注册tab
document.getElementById('loginTab').onclick = ()=>{
  document.getElementById('loginForm').style.display='block';
  document.getElementById('regForm').style.display='none';
  document.getElementById('loginTab').classList.add('active');
  document.getElementById('regTab').classList.remove('active');
}
document.getElementById('regTab').onclick = ()=>{
  document.getElementById('loginForm').style.display='none';
  document.getElementById('regForm').style.display='block';
  document.getElementById('loginTab').classList.remove('active');
  document.getElementById('regTab').classList.add('active');
}

// 登录提交
document.getElementById('loginForm').onsubmit = async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  const res = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  })
  const ret = await res.json();
  if(ret.code===0){
    alert('登录成功');
    location.href='/mine';
  }else alert(ret.msg);
}

// 注册提交
document.getElementById('regForm').onsubmit = async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  const res = await fetch('/api/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  })
  const ret = await res.json();
  if(ret.code===0){
    alert('注册成功，请登录');
    document.getElementById('loginTab').click();
  }else alert(ret.msg);
}
</script>
</body>
</html>
