<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录注册</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <h1>🐾 濮阳同城宠物市场</h1>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="publish.html">发布宠物</a>
      <a href="login.html">登录/注册</a>
      <a href="mine.html">个人中心</a>
    </div>
  </div>
</header>

<div class="container main form-wrap">
  <div class="tab-box">
    <button id="loginTab" class="active">登录</button>
    <button id="regTab">注册</button>
  </div>

  <form id="loginForm">
    <div class="form-item">
      <label>手机号</label>
      <input name="phone" required>
    </div>
    <div class="form-item">
      <label>密码</label>
      <input name="pwd" type="password" required>
    </div>
    <button class="submit-btn">登录</button>
  </form>

  <form id="regForm" style="display:none;">
    <div class="form-item">
      <label>昵称</label>
      <input name="name" required>
    </div>
    <div class="form-item">
      <label>手机号</label>
      <input name="phone" required>
    </div>
    <div class="form-item">
      <label>密码</label>
      <input name="pwd" type="password" required>
    </div>
    <button class="submit-btn">注册账号</button>
  </form>
</div>

<script src="js/main.js"></script>
<script>
// 切换tab
document.getElementById('loginTab').onclick = () => {
  document.getElementById('loginForm').style.display = 'block'
  document.getElementById('regForm').style.display = 'none'
  document.getElementById('loginTab').classList.add('active')
  document.getElementById('regTab').classList.remove('active')
}
document.getElementById('regTab').onclick = () => {
  document.getElementById('loginForm').style.display = 'none'
  document.getElementById('regForm').style.display = 'block'
  document.getElementById('loginTab').classList.remove('active')
  document.getElementById('regTab').classList.add('active')
}

// 登录
document.getElementById('loginForm').onsubmit = function(e) {
  e.preventDefault()
  const phone = this.phone.value
  const pwd = this.pwd.value
  const userList = Storage.get('userList')
  const user = userList.find(u => u.phone === phone && u.pwd === pwd)
  if (!user) return alert('账号密码错误')
  Storage.set('loginUser', user)
  alert('登录成功')
  goPage('mine.html')
}

// 注册
document.getElementById('regForm').onsubmit = function(e) {
  e.preventDefault()
  const name = this.name.value
  const phone = this.phone.value
  const pwd = this.pwd.value
  const userList = Storage.get('userList')
  if (userList.find(u => u.phone === phone)) return alert('手机号已注册')
  const newUser = { id: createId(), name, phone, pwd, city: '濮阳' }
  userList.push(newUser)
  Storage.set('userList', userList)
  alert('注册成功，请登录')
  document.getElementById('loginTab').click()
}
</script>
</body>
</html>
